name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Build in dependency order (core first, then dependents)
      - name: Build core
        working-directory: packages/core
        run: bun run build

      - name: Build http
        working-directory: packages/http
        run: bun run build

      - name: Build remaining packages
        run: |
          cd packages/config && bun run build && cd ../..
          cd packages/events && bun run build && cd ../..
          cd packages/validator && bun run build && cd ../..
          cd packages/http-elysia && bun run build && cd ../..
          cd packages/websocket && bun run build && cd ../..
          cd packages/websocket-elysia && bun run build && cd ../..
          cd packages/cli && bun run build && cd ../..
          cd packages/devtools && bun run build && cd ../..

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
