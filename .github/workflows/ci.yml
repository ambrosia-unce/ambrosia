name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint packages
        run: bunx biome check ./packages

      - name: Build all packages
        run: bun run build

      - name: Typecheck core
        working-directory: packages/core
        run: bun run typecheck

      - name: Typecheck http
        working-directory: packages/http
        run: bun run typecheck

      - name: Typecheck config
        working-directory: packages/config
        run: bun run typecheck

      - name: Typecheck events
        working-directory: packages/events
        run: bun run typecheck

      - name: Typecheck validator
        working-directory: packages/validator
        run: bun run typecheck

      - name: Test core
        working-directory: packages/core
        run: bun test

      - name: Test http
        working-directory: packages/http
        run: bun test

      - name: Test config
        working-directory: packages/config
        run: bun test

      - name: Test events
        working-directory: packages/events
        run: bun test
