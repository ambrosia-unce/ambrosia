name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (dependency order)
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/http && bun run build && cd ../..
          cd packages/config && bun run build && cd ../..
          cd packages/events && bun run build && cd ../..
          cd packages/validator && bun run build && cd ../..
          cd packages/http-elysia && bun run build && cd ../..
          cd packages/websocket && bun run build && cd ../..
          cd packages/websocket-elysia && bun run build && cd ../..
          cd packages/cli && bun run build && cd ../..
          cd packages/devtools && bun run build && cd ../..

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Dual publish: also push to GitHub Packages
      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@ambrosia:registry=https://npm.pkg.github.com" >> .npmrc
          echo "provenance=false" >> .npmrc

          for pkg in packages/core packages/http packages/http-elysia packages/validator packages/cli packages/config packages/events packages/devtools; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg to GitHub Packages..."
              cd "$pkg"
              npm publish --registry=https://npm.pkg.github.com || true
              cd "$GITHUB_WORKSPACE"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
